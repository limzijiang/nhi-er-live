name: Fetch ER data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-er
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data
        run: python3 scripts/fetch_er.py

      - name: Commit & push
        run: |
          git config user.name "er-data-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "data: $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
          git pull --rebase
          git push
