name: Fetch boarding-48h indicator

on:
  schedule:
    - cron: "20 1 * * 1"   # 每週一 09:20 台灣時間（季指標，週更足夠）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-er
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch indicator
        run: python3 scripts/fetch_boarding.py

      - name: Commit & push
        run: |
          git config user.name "er-data-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/boarding48.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "data: boarding48 指標更新"
          git pull --rebase
          git push
